services:
  backend:
    image: 889088857850.dkr.ecr.ap-south-1.amazonaws.com/react-express-backend:latest
    container_name: backend
    ports:
      - "80:80"
    environment:
      DATABASE_DB: example
      DATABASE_USER: root
      DATABASE_PASSWORD: /run/secrets/db-password
      DATABASE_HOST: db
      NODE_ENV: production
    depends_on:
      - db
    secrets:
      - db-password
    networks:
      - private
      - public

  frontend:
    image: 889088857850.dkr.ecr.ap-south-1.amazonaws.com/react-express-frontend:latest
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - public

  db:
    image: mariadb:10.6.4-focal
    container_name: db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: example
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db-password
    volumes:
      - db-data:/var/lib/mysql
    secrets:
      - db-password
    networks:
      - private

networks:
  public:
  private:

volumes:
  db-data:

secrets:
  db-password:
    file: ./db/password.txt