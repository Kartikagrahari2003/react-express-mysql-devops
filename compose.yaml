services:
  backend:
    build:
      context: backend
      args:
        NODE_ENV: production

    environment:
      DATABASE_DB: example
      DATABASE_USER: root
      DATABASE_PASSWORD: /run/secrets/db-password
      DATABASE_HOST: db
      NODE_ENV: production

    ports:
      - "80:80"

    secrets:
      - db-password

    networks:
      - public
      - private

    depends_on:
      - db

  db:
    image: mariadb:10.6.4-focal
    command: --default-authentication-plugin=mysql_native_password
    restart: always

    environment:
      MYSQL_DATABASE: example
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db-password

    secrets:
      - db-password

    volumes:
      - db-data:/var/lib/mysql

    networks:
      - private

  frontend:
    build:
      context: frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - public

networks:
  public:
  private:

volumes:
  db-data:

secrets:
  db-password:
    file: db/password.txt